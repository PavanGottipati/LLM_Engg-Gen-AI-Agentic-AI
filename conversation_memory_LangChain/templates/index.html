<!DOCTYPE html>
<html>

<head>
    <title>LangChain Chatbot</title>
</head>

<body style="font-family:'Segoe UI',Arial,sans-serif;max-width:750px;margin:40px auto;background:#f0f2f5;">

    <div style="background:linear-gradient(135deg,#2563eb,#7c3aed);color:white;padding:18px 20px;border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center;">

        <div style="font-size:20px;font-weight:600;">
            🤖 LangChain Chatbot
        </div>

        <button onclick="clearMemory()"
            style="background:white;color:#2563eb;border:none;padding:8px 16px;border-radius:20px;font-weight:bold;cursor:pointer;">
            Clear Memory
        </button>

    </div>

    <div style="background:white;border:1px solid #ddd;border-top:none;border-radius:0 0 12px 12px;padding:20px;">

        <div id="chatBox"
            style="height:400px;overflow-y:auto;background:#f8fafc;border:1px solid #ddd;border-radius:10px;padding:15px;margin-bottom:15px;">

            <div style="margin-bottom:15px;text-align:left;">
                <span
                    style="display:inline-block;background:white;border:1px solid #ddd;padding:12px 16px;border-radius:12px;color:#333;">
                    👋 Hello! I'm your AI assistant. How can I help you today?
                </span>
            </div>

        </div>

        <div style="display:flex;gap:10px;">

            <input id="message"
                type="text"
                placeholder="Type your message..."
                onkeypress="if(event.key==='Enter')sendMessage();"
                style="flex:1;padding:12px;border:1px solid #ccc;border-radius:8px;font-size:14px;">

            <button onclick="sendMessage()"
                style="background:#2563eb;color:white;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:14px;">
                Send
            </button>

        </div>

    </div>

    <script>

        async function sendMessage() {

            let input = document.getElementById("message");
            let message = input.value.trim();

            if (message == "")
                return;

            let chat = document.getElementById("chatBox");

            chat.innerHTML += `
            <div style="text-align:right;margin-bottom:15px;">
                <span style="display:inline-block;background:#2563eb;color:white;padding:12px 16px;border-radius:12px;">
                    ${message}
                </span>
            </div>
        `;

            input.value = "";

            chat.innerHTML += `
            <div id="typing" style="margin-bottom:15px;">
                <span style="display:inline-block;background:white;border:1px solid #ddd;padding:12px 16px;border-radius:12px;color:#777;">
                    Thinking...
                </span>
            </div>
        `;

            chat.scrollTop = chat.scrollHeight;

            const response = await fetch("/chat", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    message: message
                })

            });

            const data = await response.json();

            document.getElementById("typing").remove();

            chat.innerHTML += `
            <div style="text-align:left;margin-bottom:15px;">
                <span style="display:inline-block;background:white;border:1px solid #ddd;padding:12px 16px;border-radius:12px;color:#333;">
                    ${data.response}
                </span>
            </div>
        `;

            chat.scrollTop = chat.scrollHeight;

        }

        async function clearMemory() {

            await fetch("/clear");

            document.getElementById("chatBox").innerHTML = `
            <div style="margin-bottom:15px;">
                <span style="display:inline-block;background:white;border:1px solid #ddd;padding:12px 16px;border-radius:12px;">
                    👋 Memory cleared. Start a new conversation.
                </span>
            </div>
        `;

        }

    </script>

</body>

</html>
